name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela execuções antigas da mesma ref para não formar fila.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes unitários (domínio)
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Instalar browser do Playwright
        run: npx playwright install --with-deps chromium

      - name: Testes E2E
        run: npm run test:e2e
